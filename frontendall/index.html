<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EMS</title>
    <!--
      The federation plugin's own dynamic per-remote CSS injection is broken
      under Vite 8 (see each remote's scripts/fixRemoteEntry.cjs), so each
      remote's stylesheet is linked statically here instead. All four apps
      share the same Tailwind theme, so this is safe to always load.
      Vite substitutes the placeholders below from .env locally, or from
      whatever env vars are configured on the Vercel project in production.
    -->
    <link rel="stylesheet" href="%VITE_EMS_URL%/assets/remote-style.css" />
    <link rel="stylesheet" href="%VITE_SALES_URL%/assets/remote-style.css" />
    <link rel="stylesheet" href="%VITE_FOLLOWUPS_URL%/assets/remote-style.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
